<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- 定位到中心 -->
  <g transform="translate(80,80)">
    <!-- 旋转层 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
      <!-- 太极符号：白底圆+黑半圆 -->
      <circle cx="0" cy="0" r="48" fill="white" filter="url(#shadow)"/>
      <path d="M0,-48 A48,48 0 0,1 0,48 A24,24 0 0,1 0,0 A24,24 0 0,0 0,-48 Z" fill="#C41E3A"/>
      <circle cx="0" cy="-24" r="8" fill="#C41E3A"/>
      <circle cx="0" cy="24" r="8" fill="white"/>
    </g>
  </g>
</svg>
