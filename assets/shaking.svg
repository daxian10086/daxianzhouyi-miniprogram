<svg width="160" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#C41E3A"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#C41E3A" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- 外圈固定 -->
  <circle cx="80" cy="80" r="65" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- ☯ 旋转 -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="2s" repeatCount="indefinite"/>
    <text x="80" y="90" font-family="serif" font-size="56" text-anchor="middle" fill="white" opacity="0.95">☯</text>
  </g>
</svg>
