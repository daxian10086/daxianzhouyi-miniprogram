name: Deploy to WeChat Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install wechat-miniprogram-ci
        run: npm install -g miniprogram-ci
      
      - name: Save private key
        run: echo "${{ secrets.WEAPP_PRIVATE_KEY }}" > private_key.pem
      
      - name: Upload to WeChat Mini Program
        id: upload
        run: |
          npx miniprogram-ci upload \
            --appid wx8efbbb29c6b81122 \
            --privateKeyPath private_key.pem \
            --projectPath . \
            --version 2.4.189 \
            --desc 'CI 自动上传' \
            --setting '{"es6":true,"enhance":true,"minify":true}'
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Upload failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Upload completed successfully"
