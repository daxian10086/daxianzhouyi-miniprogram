name: Deploy to WeChat Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install miniprogram-ci
        run: pip install miniprogram-ci
      
      - name: Save private key
        run: echo "${{ secrets.WEAPP_PRIVATE_KEY }}" > private_key.pem
      
      - name: Deploy to WeChat Mini Program
        run: |
          python << 'PYEOF'
          import miniprogram_ci
          from pathlib import Path
          
          project = miniprogram_ci.Project(
            appid='wx8efbbb29c6b81122',
            type='miniProgram',
            projectPath=Path('.'),
            privateKeyPath='private_key.pem',
            ignores=['node_modules/**/*', '.git/**/*']
          )
          
          upload_result = miniprogram_ci.upload(
            project=project,
            version='2.4.188',
            desc='CI 自动上传',
            setting={
              'es6': True,
              'enhance': True,
              'minify': True
            }
          )
          print(f"Upload success!")
          print(f"Code id: {upload_result.codeid}")
          print(f"Mini code id: {upload_result.miniCodeid}")
          PYEOF
