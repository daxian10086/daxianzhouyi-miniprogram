name: Deploy to WeChat Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install wechat-miniprogram-ci
        run: npm install -g miniprogram-ci@latest
      
      - name: Save private key
        run: |
          echo "${{ vars.WEAPP_PRIVATE_KEY_B64 }}" | base64 -d > private_key.pem
          echo "Private key saved: $(wc -c < private_key.pem) bytes"
      
      - name: Upload to WeChat Mini Program
        id: upload
        env:
          WEAPP_APPID: ${{ vars.WEAPP_APPID }}
        run: |
          echo "=== miniprogram-ci version ==="
          npx miniprogram-ci --version
          echo "=== upload start ==="
          npx miniprogram-ci upload \
            --appid $WEAPP_APPID \
            --projectPath . \
            --privateKeyPath ./private_key.pem \
            --upload-version "2.4.189" \
            --upload-description "v2.4.189 - CI自动上传" \
            --robot 1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Upload failed"
            exit 1
          fi
          echo "Upload completed successfully"
