name: Deploy to WeChat Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install wechat-miniprogram-ci
        run: npm install -g miniprogram-ci@latest

      - name: Save private key
        run: |
          echo "${{ vars.WEAPP_PRIVATE_KEY_B64 }}" | base64 -d > private_key.pem

      - name: Read current version
        id: version
        run: |
          CURRENT_VER=$(cat version.txt)
          echo "Current version: $CURRENT_VER"
          echo "current_ver=$CURRENT_VER" >> $GITHUB_OUTPUT

      - name: Update app.json version
        run: |
          VERSION="2.4.${{ steps.version.outputs.current_ver }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"v${VERSION}\"/" app.json
          sed -i "s/\"versionDate\": \"[^\"]*\"/\"versionDate\": \"$(date +%Y-%m-%d)\"/" app.json
          echo "Updated app.json version to v${VERSION}"

      - name: Update index.js version
        run: |
          VERSION="2.4.${{ steps.version.outputs.current_ver }}"
          sed -i "s/version: 'v[^']*'/version: 'v${VERSION}'/" pages/index/index.js
          echo "Updated index.js version to v${VERSION}"

      - name: Update app.js version
        run: |
          VERSION="2.4.${{ steps.version.outputs.current_ver }}"
          VERSION_DATE=$(date +%Y-%m-%d)
          sed -i "s/version: 'v[^']*'/version: 'v${VERSION}'/" app.js
          sed -i "s/versionDate: '[^']*'/versionDate: '${VERSION_DATE}'/" app.js
          echo "Updated app.js version to v${VERSION}"

      - name: Upload to WeChat Mini Program
        id: upload
        env:
          WEAPP_APPID: ${{ vars.WEAPP_APPID }}
        run: |
          VERSION="2.4.${{ steps.version.outputs.current_ver }}"
          npx miniprogram-ci upload \
            --appid $WEAPP_APPID \
            --projectPath . \
            --privateKeyPath ./private_key.pem \
            --upload-version "${VERSION}" \
            --upload-description "v${VERSION} - CI自动上传" \
            --robot 1
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Upload completed successfully"
            echo "upload_status=success" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 1 ]; then
            # 检查是否是版本号冲突（code 20003）
            echo "Upload failed with code $EXIT_CODE, checking reason..."
            echo "upload_status=failed" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Upload failed with unexpected code $EXIT_CODE"
            echo "upload_status=error" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Increment version
        run: |
          CURRENT_VER=$(cat version.txt)
          NEW_VER=$((CURRENT_VER + 1))
          echo $NEW_VER > version.txt
          echo "Incremented version from ${CURRENT_VER} to ${NEW_VER}"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "ci: 版本号更新 to 2.4.${{ steps.version.outputs.current_ver }}"
          git push --force origin main
